
<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Solo Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Cairo', 'sans-serif'],
            },
            colors: {
              'game-black': 'var(--color-bg)',
              'game-dark': 'var(--color-surface)',
              'game-red': 'var(--color-primary)',
              'game-red-dim': 'var(--color-primary-dim)',
              'game-accent': 'var(--color-accent)',
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out',
              'slide-up': 'slideUp 0.4s ease-out',
              'pop': 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* Default Red/Black Theme */
        --color-bg: #0a0a0a;
        --color-surface: #171717;
        --color-primary: #dc2626;
        --color-primary-dim: #7f1d1d;
        --color-accent: #ef4444;
      }

      body {
        background-color: var(--color-bg);
        color: white;
        -webkit-tap-highlight-color: transparent;
        transition: background-color 0.3s ease, color 0.3s ease;
        overscroll-behavior-y: none; /* Prevent bounce effect on mobile */
        overflow: hidden; /* Main scroll handled by App container */
        touch-action: pan-x pan-y;
      }
      
      /* Force LTR for English */
      html[lang="en"] {
        direction: ltr;
      }
      html[lang="en"] .font-cairo {
        font-family: sans-serif; 
      }

      /* Custom Scrollbar for gaming feel - HIDDEN by default now via utility */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes pop {
        0% { transform: scale(0.95); opacity: 0.5; }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); opacity: 1; }
      }

      .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
      .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
      .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
      
      /* Circular Progress Transition */
      .circular-progress-circle {
        transition: stroke-dashoffset 1s ease-in-out;
      }
      
      /* Robust Scrollbar Hiding */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
      
      /* Safe area for mobile navigation - Enhanced */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@capacitor/core": "https://esm.sh/@capacitor/core@^6.0.0",
    "@capacitor/app": "https://esm.sh/@capacitor/app@^6.0.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
