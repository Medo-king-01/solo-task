name: Build Android APK

on:
  push:
    branches: [ main, master ] # سيبدأ البناء تلقائياً عند أي رفع للكود

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. جلب الكود من المستودع
      - uses: actions/checkout@v4
      
      # 2. إعداد Node.js 22
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. إعداد Java 21
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 4. إنشاء ملف البيئة وحقن مفتاح Gemini السري
      - name: Create .env file
        run: |
          echo "VITE_GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env

      # 5. تثبيت المكتبات مع حل مشكلة تضارب الإصدارات
      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      # 6. بناء نسخة الويب
      - name: Build Web App
        run: npm run build

      # --- الخطوة المضافة: توليد أيقونات الأندرويد وشاشة التحميل ---
      - name: Generate Android Assets
        run: npx capacitor-assets generate --android

      # 7. مزامنة الكود مع منصة أندرويد (الآن سيتم نقل الأيقونات الجديدة)
      - name: Sync Capacitor
        run: npx cap sync android

      # 8. بناء ملف الـ APK النهائي
      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 9. رفع ملف الـ APK الناتج
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SoloLevel-App-With-Icons
          path: android/app/build/outputs/apk/debug/app-debug.apk
